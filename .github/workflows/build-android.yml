name: Build Android (Google Play)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Initialize Capacitor Android project
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── DEBUG BUILD (always, no signing needed) ──────────────────────────
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clc-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── RELEASE BUILD (Play Store) — requires keystore secrets ───────────
      # Before enabling the release build, add these GitHub Repository Secrets:
      #   KEYSTORE_BASE64     — your .jks keystore file, base64-encoded
      #                         (run: base64 -i release.keystore | pbcopy)
      #   KEY_ALIAS           — key alias used when creating the keystore
      #   KEY_PASSWORD        — key password
      #   STORE_PASSWORD      — keystore password
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build Signed Release AAB (for Play Store)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd android && ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: clc-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

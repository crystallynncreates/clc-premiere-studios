name: Deploy to Vercel (Web)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── Vercel Deployment ────────────────────────────────────────────────
      # Option A (RECOMMENDED): Skip this workflow entirely.
      #   Connect your GitHub repo directly at vercel.com/new — Vercel will
      #   auto-build and deploy on every push to main, with zero secrets needed.
      #
      # Option B: Deploy via CLI (add these GitHub Secrets first):
      #   VERCEL_TOKEN   — from vercel.com → Account Settings → Tokens
      #   VERCEL_ORG_ID  — from .vercel/project.json after `vercel link`
      #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
      - name: Deploy to Vercel (production)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D22"/>
      <stop offset="100%" stop-color="#141430"/>
    </linearGradient>
    <linearGradient id="jadeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D485"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D485" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7C5CF6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080812" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (maskable safe zone = inner 80%) -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="230" fill="url(#glowGrad)"/>

  <!-- Outer jade ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#jadeGrad)" stroke-width="3.5" opacity="0.75"/>

  <!-- Inner violet ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#violetGrad)" stroke-width="1.2" opacity="0.4"/>

  <!-- Decorative tick marks on outer ring -->
  <g stroke="#00D485" stroke-width="3" opacity="0.5">
    <line x1="256" y1="18" x2="256" y2="30"/>
    <line x1="256" y1="482" x2="256" y2="494"/>
    <line x1="18" y1="256" x2="30" y2="256"/>
    <line x1="482" y1="256" x2="494" y2="256"/>
    <line x1="74" y1="74" x2="83" y2="83"/>
    <line x1="429" y1="429" x2="438" y2="438"/>
    <line x1="74" y1="438" x2="83" y2="429"/>
    <line x1="429" y1="83" x2="438" y2="74"/>
  </g>

  <!-- CLC letters -->
  <text
    x="256" y="298"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="148"
    fill="url(#jadeGrad)"
    filter="url(#softGlow)"
    letter-spacing="4"
  >CLC</text>

  <!-- PREMIER tagline -->
  <text
    x="256" y="356"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="600"
    font-size="30"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="10"
  >PREMIER</text>

  <!-- Bottom accent line -->
  <rect x="156" y="372" width="200" height="1.5" rx="1" fill="url(#violetGrad)" opacity="0.6"/>
</svg>
